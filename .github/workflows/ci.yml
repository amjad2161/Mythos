name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest tests/ -q

  integration:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: mythos
          RABBITMQ_DEFAULT_PASS: mythos
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.12.4
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with orchestration dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,orchestration]"

      - name: Run integration tests against live services
        env:
          MYTHOS_BROKER_URL: amqp://mythos:mythos@localhost:5672/
          MYTHOS_QDRANT_URL: http://localhost:6333
        run: python -m pytest tests/integration -m integration -q
